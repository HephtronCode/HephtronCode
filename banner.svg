<svg xmlns="http://www.w3.org/2000/svg" version="1.1" viewBox="0 0 800 220">
  <defs>
    <linearGradient id="cyberGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    <linearGradient id="forgeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff0055" />
      <stop offset="100%" stop-color="#00f2fe" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#8b949e" />
    </linearGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#21262d" stroke-width="1"/>
    </pattern>

    <style>
      .bg-rect { fill: #0d1117; stroke: #30363d; stroke-width: 2; rx: 12; }
      .bg-grid { fill: url(#grid); opacity: 0.4; rx: 12; }
      
      .main-text { fill: url(#textGradient); font-family: 'Courier New', monospace; font-size: 56px; font-weight: 900; letter-spacing: 2px; }
      .accent-text { fill: #00f2fe; filter: url(#glow); }
      .sub-text { fill: #8b949e; font-family: 'Courier New', monospace; font-size: 20px; font-weight: 500; letter-spacing: 2px; }
      
      .core-structure { fill: none; stroke: url(#cyberGradient); stroke-width: 3; filter: url(#glow); stroke-dasharray: 600; stroke-dashoffset: 600; animation: buildCore 3s ease-out forwards; }
      .core-heart { fill: url(#forgeGradient); filter: url(#glow); transform-origin: 100px 110px; animation: breatheHeart 4s ease-in-out infinite; }
      .core-plate { fill: #0d1117; stroke: url(#cyberGradient); stroke-width: 2; opacity: 0; animation: activatePlates 1s ease-out 2s forwards; }
      .circuit-line { fill: none; stroke: url(#cyberGradient); stroke-width: 1.5; filter: url(#glow); stroke-dasharray: 200; stroke-dashoffset: 200; animation: activateCircuits 4s linear infinite; }
      .particle { fill: #00f2fe; opacity: 0; animation: flare 3s infinite; }
      .cursor { fill: #00f2fe; animation: blink 1s step-end infinite; }

      @keyframes buildCore { to { stroke-dashoffset: 0; } }
      @keyframes activatePlates { to { opacity: 1; } }
      @keyframes breatheHeart { 
        0%, 100% { transform: scale(1); } 
        50% { transform: scale(1.15); } 
      }
      @keyframes activateCircuits {
        0% { stroke-dashoffset: 200; }
        100% { stroke-dashoffset: -200; }
      }
      @keyframes flare {
        0% { transform: translate(0,0) scale(0); opacity: 0; }
        50% { opacity: 0.8; }
        100% { transform: translate(var(--tx), var(--ty)) scale(1); opacity: 0; }
      }
      @keyframes blink { 
        0%, 100% { opacity: 1; } 
        50% { opacity: 0; } 
      }
    </style>
  </defs>

  <rect class="bg-rect" x="2" y="2" width="796" height="216" />
  <rect class="bg-grid" x="2" y="2" width="796" height="216" />

  <!-- Animated Particles -->
  <circle class="particle" cx="100" cy="110" r="3" style="--tx: 30px; --ty: -40px;" />
  <circle class="particle" cx="100" cy="110" r="2" style="--tx: -50px; --ty: 20px; animation-delay: 1s;" />
  <circle class="particle" cx="100" cy="110" r="2.5" style="--tx: 40px; --ty: 30px; animation-delay: 2s;" />

  <g transform="translate(100, 110)">
    <path class="core-structure" d="M -40 -40 Q 0 -60 40 -40 L 40 40 Q 0 60 -40 40 Z M -30 -30 L 30 -30 L 30 30 L -30 30 Z" />
    <path class="core-heart" d="M 0 0 Q 8 -12 0 -25 Q -8 -12 0 0 Z M 0 10 L 0 20 Z" transform="translate(0, 10)" />
    
    <g transform="rotate(15)">
      <path class="core-plate" d="M -25 -25 h 15 v 15 h -15 z" />
      <path class="core-plate" d="M 10 -25 h 15 v 15 h -15 z" />
      <path class="core-plate" d="M -25 10 h 15 v 15 h -15 z" />
      <path class="core-plate" d="M 10 10 h 15 v 15 h -15 z" />
    </g>
    
    <path class="circuit-line" d="M 50 0 h 30" />
    <path class="circuit-line" d="M -50 0 h -30" />
    <path class="circuit-line" d="M 0 50 v 30" />
    <path class="circuit-line" d="M 0 -50 v -30" />
  </g>

  <g transform="translate(220, 100)">
    <text class="main-text" x="0" y="0">HEPHTRON<tspan class="accent-text">CODE</tspan></text>
    <text class="sub-text" x="10" y="45">Babatunde Abu-bakr</text>
    <rect class="cursor" x="250" y="30" width="12" height="20" />
  </g>
</svg>
