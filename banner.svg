<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="100%" height="100%">
  <defs>
    <linearGradient id="cyberGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    <linearGradient id="forgeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff0055" />
      <stop offset="100%" stop-color="#00f2fe" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#8b949e" />
    </linearGradient>
    
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#21262d" stroke-width="1"/>
    </pattern>

    <style>
      /* Base Styles */
      .bg-rect { fill: #0d1117; stroke: #30363d; stroke-width: 2; rx: 12; transition: stroke 0.4s ease; }
      .bg-grid { fill: url(#grid); opacity: 0.5; rx: 12; transition: opacity 0.4s ease; }
      
      /* Typography */
      .main-text { fill: url(#textGradient); font-family: 'Courier New', monospace; font-size: 56px; font-weight: 900; letter-spacing: 2px; }
      .accent-text { fill: #00f2fe; }
      .sub-text { fill: #8b949e; font-family: 'Courier New', monospace; font-size: 20px; font-weight: 500; letter-spacing: 2px; transition: all 0.4s ease; }
      .code-bracket { fill: #00f2fe; font-family: 'Courier New', monospace; font-size: 50px; font-weight: bold; }
      
      /* Shapes & Animations */
      .core-structure { fill: none; stroke: url(#cyberGradient); stroke-width: 3; filter: url(#glow); stroke-dasharray: 600; stroke-dashoffset: 600; animation: buildCore 3s ease-out forwards; }
      .core-heart { fill: url(#forgeGradient); filter: url(#glow); transform-box: fill-box; transform-origin: center; animation: breatheHeart 4s ease-in-out infinite; }
      .core-plate { fill: #0d1117; stroke: url(#cyberGradient); stroke-width: 2; opacity: 0; animation: activatePlates 1s ease-out 2s forwards; }
      .circuit-line { fill: none; stroke: url(#cyberGradient); stroke-width: 1.5; filter: url(#glow); stroke-dasharray: 200; stroke-dashoffset: 200; opacity: 0.8; animation: activateCircuits 4s linear infinite; }
      .cursor { fill: #00f2fe; animation: blink 1s step-end infinite; }
      
      /* Hover Interactivity */
      svg:hover .bg-rect { stroke: #00f2fe; }
      svg:hover .bg-grid { opacity: 1; }
      svg:hover .sub-text { fill: #00f2fe; letter-spacing: 6px; }
      svg:hover .main-text { filter: brightness(1.2); }
      svg:hover .core-structure { filter: url(#glow) brightness(1.3); }

      /* Keyframes */
      @keyframes buildCore { to { stroke-dashoffset: 0; } }
      @keyframes activatePlates { to { opacity: 1; } }
      @keyframes breatheHeart { 
        0%, 100% { transform: scale(1); filter: url(#glow) brightness(1.1); } 
        50% { transform: scale(1.1); filter: url(#glow) brightness(1.4); } 
      }
      @keyframes activateCircuits {
        0% { stroke-dashoffset: 200; }
        50% { stroke-dashoffset: 0; }
        100% { stroke-dashoffset: -200; }
      }
      @keyframes blink { 
        0%, 100% { opacity: 1; } 
        50% { opacity: 0; } 
      }
    </style>
  </defs>

  <rect class="bg-rect" x="5" y="5" width="790" height="210" rx="12" />
  <rect class="bg-grid" x="5" y="5" width="790" height="210" rx="12" />

  <g transform="translate(100, 110)">
    <path class="core-structure" d="M -40 -40 Q 0 -60 40 -40 L 40 40 Q 0 60 -40 40 Z M -30 -30 L 30 -30 L 30 30 L -30 30 Z" />
    
    <path class="core-heart" d="M 0 0 Q 8 -12 0 -25 Q -8 -12 0 0 Z M 0 10 L 0 20 Z" />
    
    <g class="core-plates-group" transform="rotate(15)">
      <path class="core-plate" transform="translate(-25, -25)" d="M 0 0 L 15 0 L 15 15 L 0 15 Z" />
      <path class="core-plate" transform="translate(10, -25)" d="M 0 0 L 15 0 L 15 15 L 0 15 Z" />
      <path class="core-plate" transform="translate(-25, 10)" d="M 0 0 L 15 0 L 15 15 L 0 15 Z" />
      <path class="core-plate" transform="translate(10, 10)" d="M 0 0 L 15 0 L 15 15 L 0 15 Z" />
    </g>
    
    <path class="circuit-line" d="M 50 0 L 60 0 Q 70 0 70 10 L 70 20 L 80 20" />
    <path class="circuit-line" d="M -50 0 L -60 0 Q -70 0 -70 -10 L -70 -20 L -80 -20" />
    <path class="circuit-line" d="M 0 50 L 0 60 Q 0 70 10 70 L 20 70 L 20 80" />
    <path class="circuit-line" d="M 0 -50 L 0 -60 Q 0 -70 -10 -70 L -20 -70 L -20 -80" />
  </g>

  <g transform="translate(210, 100)">
    <text class="main-text" x="0" y="0">HEPHTRON<tspan class="accent-text">CODE</tspan></text>
    
    <text class="sub-text" x="20" y="45">Babatunde Abu-bakr</text>
    
    <rect class="cursor" x="260" y="30" width="12" height="20" />
  </g>
</svg>
